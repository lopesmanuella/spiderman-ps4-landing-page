<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man PS4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Spider-Man</h1>
        <p>Seja o herói de Nova York</p>
        <button onclick="scrollToTrailer()">Ver Trailer</button>
    </header>

    <main>

        <section class="game">
            <header>
                <h2>Sobre o Jogo</h2>
            </header>

            <div class="game-content">
                <p>
                    Em Marvel Spider-Man você vive a história de Peter Parker,
                    enfrentando vilões enquanto protege Nova York.
                </p>

                <section class="info">
                    <article>
                        <h3>🕹️ Gênero</h3>
                        <p>Ação / Aventura</p>
                    </article>

                    <article>
                        <h3>🏙️ Ambiente</h3>
                        <p>Mundo aberto em Nova York</p>
                    </article>

                    <article>
                        <h3>🎮 Plataforma</h3>
                        <p>PlayStation</p>
                    </article>
                </section>
            </div>
        </section>

        <section class="trailer" id="trailer">
            <h2>Trailer</h2>

            <iframe 
                width="100%" 
                height="450"
                src="https://www.youtube.com/embed/1E051WtpyWg"
                title="Spider-Man Trailer"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </section>

    </main>

    <script>
        function scrollToTrailer() {
            document.getElementById("trailer").scrollIntoView({
                behavior: "smooth"
            });
        }
    </script>

</body>
</html>
